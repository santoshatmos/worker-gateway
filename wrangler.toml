name = "worker-gateway-template"
main = "worker.js"
compatibility_date = "2026-03-15"
workers_dev = false

# Deploy with this file only for ad-hoc testing.
# For production, copy this file (or use wrangler.<env>.toml)
# with a unique worker name + route binding per domain.
routes = [
  { pattern = "assets.an1688.com/json/*", zone_name = "an1688.com" },
  { pattern = "assets.an1688.com/latest.json", zone_name = "an1688.com" }
]

[vars]
ROUTE_PREFIX = "/json"
ORIGIN_BASE = "https://hudie.an1688.com;https://api.an1688.com;https://api.hudie123.xyz"
ORIGIN_SUB_PATH_PREFIX = "/json"
