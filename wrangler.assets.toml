name = "worker-gateway-assets"
main = "worker.js"
compatibility_date = "2026-03-15"
workers_dev = false

routes = [
  { pattern = "assets.an1688.com/api/v1/assets*", zone_name = "an1688.com" },
  { pattern = "assets.an1688.com/api/v1/latest", zone_name = "an1688.com" },
  { pattern = "assets.an1688.com/api/v1/orderinfo", zone_name = "an1688.com" }
]

[vars]
ROUTE_PREFIX = "/json"
ORIGIN_BASE = "https://api.hudie123.xyz;https://hudie.an1688.com;https://api.an1688.com"
ORIGIN_SUB_PATH_PREFIX = "/json"
